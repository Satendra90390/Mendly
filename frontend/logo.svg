<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="pulse" x1="30" y1="100" x2="170" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="50%" stop-color="#99F6E4"/>
      <stop offset="100%" stop-color="#CCFBF1"/>
    </linearGradient>
    <linearGradient id="cross" x1="100" y1="148" x2="100" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CCFBF1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="8" y="8" width="184" height="184" rx="44" fill="url(#bg)"/>
  <rect x="8" y="8" width="184" height="184" rx="44" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Heartbeat / Pulse line forming "M" -->
  <g filter="url(#glow)">
    <path d="M35 105 L55 105 L65 70 L80 135 L95 55 L110 135 L120 70 L135 105 L165 105"
          fill="none" stroke="url(#pulse)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Small pulse dots at key points -->
    <circle cx="80" cy="135" r="4" fill="#5EEAD4" opacity="0.9"/>
    <circle cx="95" cy="55" r="4.5" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="110" cy="135" r="4" fill="#5EEAD4" opacity="0.9"/>
  </g>

  <!-- Medical cross at bottom -->
  <rect x="95" y="155" width="10" height="26" rx="3" fill="url(#cross)" opacity="0.9"/>
  <rect x="87" y="163" width="26" height="10" rx="3" fill="url(#cross)" opacity="0.9"/>
</svg>
