<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="200" y1="200" x2="824" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="1024" height="1024" rx="220" fill="#0F172A"/>
  <!-- DNA helix + chat bubble — single continuous line -->
  <g filter="url(#glow)">
    <!-- Chat bubble shape -->
    <path d="M340 320 C340 280, 370 250, 410 250 L614 250 C654 250, 684 280, 684 320 L684 520 C684 560, 654 590, 614 590 L480 590 L400 660 L420 590 L410 590 C370 590, 340 560, 340 520 Z" stroke="url(#logoGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- DNA helix inside bubble -->
    <path d="M430 340 C460 310, 500 310, 530 340 C560 370, 600 370, 630 340" stroke="url(#logoGrad)" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M430 390 C460 420, 500 420, 530 390 C560 360, 600 360, 630 390" stroke="url(#logoGrad)" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M430 440 C460 410, 500 410, 530 440 C560 470, 600 470, 630 440" stroke="url(#logoGrad)" stroke-width="20" stroke-linecap="round" fill="none"/>
    <path d="M430 490 C460 520, 500 520, 530 490 C560 460, 600 460, 630 490" stroke="url(#logoGrad)" stroke-width="20" stroke-linecap="round" fill="none"/>
    <!-- Connecting rungs -->
    <line x1="475" y1="320" x2="475" y2="410" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="530" y1="340" x2="530" y2="390" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
    <line x1="585" y1="320" x2="585" y2="410" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
