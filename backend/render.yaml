services:
  - type: web
    name: mendly-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_ORIGINS
        value: https://mendly-xi.vercel.app
      - key: FRONTEND_URL
        value: https://mendly-xi.vercel.app
      - key: CHATBOT_PROVIDER
        value: nvidia
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_API_URL
        value: https://integrate.api.nvidia.com/v1/chat/completions
      - key: NVIDIA_MODEL
        value: deepseek-ai/deepseek-v4-flash
      - key: NVIDIA_MAX_RETRIES
        value: "2"
      - key: NVIDIA_TIMEOUT
        value: "45"
      - key: PORT
        value: "8002"
    healthCheckPath: /api/health