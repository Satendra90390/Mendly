services:
  - type: web
    name: mendly-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
        value: "https://mendly.pages.dev,https://d333b595.mendly.pages.dev,https://mendly.mdl1.workers.dev,http://localhost:5500"
      - key: FRONTEND_URL
        value: "https://mendly.pages.dev"
      - key: CHATBOT_PROVIDER
        value: nvidia
      - key: BACKEND_URL
        sync: false
        value: ""
    healthCheckPath: /api/health
